name: Sonar

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: read

jobs:
  sonar:
    name: Sonar Analysis
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test
        if: env.SONAR_TOKEN == ''
        run: mvn -B clean verify

      - name: Build, test, and analyze
        if: env.SONAR_TOKEN != ''
        run: |
          mvn -B clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:5.5.0.6356:sonar \
            -Dsonar.projectKey=NgocHung11_lyringo-backend \
            -Dsonar.organization=ngochung11 \
            -Dsonar.region=us \
            -Dsonar.host.url=https://sonarcloud.io
